<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookWorms - Feed</title>
    
  <link rel="stylesheet" href="global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Lilita+One&display=swap" rel="stylesheet">
</head>

<body>    
<header>
  <div class="nav-container">

    <div class="logo-section">
      <img src="media/logo.png" alt="Logo" class="logo">
      <h1 class="site-name">Bookworms</h1>
    </div>

    <nav class="nav">
      <ul class="nav-links">
        <li class="divider">|</li>
        <li><a href="feed.html">Feed</a></li>
        <li class="divider">|</li>
        <li><a href="profile.html">Profile</a></li>
        <li class="divider">|</li>
        <li><a href="signup.html">Sign Up</a></li>
        <li class="divider">|</li>
        <li><a href="login.html" id="login-btn">Log In</a></li>
        <li class="divider">|</li>
        <li><button id="dark-mode-toggle">🌙</button></li>
      </ul>
    </nav>

  </div>
</header>

<main class="feed-layout">

  <aside class="filter-sidebar">
    <h3>Filter Posts🔍</h3>

    <input type="text" id="filter-author" placeholder="Search by author..">
    <div id="author-suggestions" class="suggestions-box"></div>

    <input type="text" id="filter-book" placeholder="Search by book..">
    <div id="book-suggestions" class="suggestions-box"></div>

    <button id="clear-filters-btn">Clear</button>
  </aside>

  <section class="feed">

    <div class="feed-tabs">
      <button type="button" id="following-tab" class="feed-tab active">Following👥</button>
      <button type="button" id="explore-tab" class="feed-tab">Explore🔥</button>
    </div>

    <div id="feed-posts"></div>
    
  </section>
</main>

<footer>
  <p>&copy; 2026 Bookworms. All rights reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
