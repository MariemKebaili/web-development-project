<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWorms - Sign Up</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Lilita+One&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="nav-container">

    <div class="logo-section">
      <img src="media/logo.png" alt="Logo" class="logo">
      <h1 class="site-name">Bookworms</h1>
    </div>

  </div>
</header>

<main class="signup-container">
  <h2>Create Your Bookworms Account</h2>
  <form id="signup-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" placeholder="Enter your username" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter a strong password" required>

    <button type="submit">Sign Up</button>
  </form>

  <p class="login-link">
    Already have an account? <a href="login.html">Log in</a>
  </p>

</main>
    
<footer>
  <p>&copy; 2026 Bookworms. All rights reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
